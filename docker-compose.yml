services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200          # ключевая строка
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
    restart: unless-stopped
    # healthcheck удалён – vault-init сам дождётся готовности

  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    depends_on:
      - vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root-token
    entrypoint: >
      sh -c "
        echo 'Waiting for Vault...' &&
        while ! vault status >/dev/null 2>&1; do sleep 2; done &&
        echo 'Vault is ready. Initializing secrets...' &&
        vault secrets enable -path=secret kv-v2 || true &&
        vault kv put secret/db username=app_user password=app_password host=db port=5432 database=ml_db &&
        echo 'Vault initialized successfully'
      "
    restart: "no"

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: ml_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ml_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    image: nikita123orange/devops-laba3:latest
    depends_on:
      vault-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root-token
      PYTHONPATH: /app
    command: >
      bash -c "
        python -c 'from src.db.database import init_db; init_db()' &&
        python -m src.predict &&
        coverage run -a -m src.unit_tests.test_endpoints &&
        (coverage report -m || true) &&
        python -m main
      "
    restart: unless-stopped

volumes:
  postgres_data: